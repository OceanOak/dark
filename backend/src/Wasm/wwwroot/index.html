<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Darklang REPL</title>
  <style>
    :root { color-scheme: light dark; --bg:#0f1117; --panel:#171a23; --fg:#e6e8ee;
            --muted:#8b90a0; --accent:#7c9cff; --ok:#6ee7a8; --err:#ff8a8a;
            --border:#262b38; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg); display:flex; flex-direction:column;
           height:100vh; }
    header { padding:14px 18px; border-bottom:1px solid var(--border); display:flex;
             align-items:baseline; gap:12px; }
    header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.3px; }
    header .status { font-size:12px; color:var(--muted); margin-left:auto; }
    header .status.busy { color:var(--accent); }
    header .status.ready { color:var(--ok); }
    header .status.err { color:var(--err); }
    #log { flex:1; overflow-y:auto; padding:16px 18px; font-size:13px; line-height:1.55; }
    .entry { margin-bottom:12px; }
    .entry .in::before { content:"› "; color:var(--accent); }
    .entry .in { color:var(--fg); white-space:pre-wrap; }
    .entry .out { color:var(--ok); white-space:pre-wrap; padding-left:1.2ch; }
    .entry .out.err { color:var(--err); }
    .chips { padding:8px 18px; display:flex; gap:8px; flex-wrap:wrap; border-top:1px solid var(--border); }
    .chip { font-size:12px; color:var(--muted); background:var(--panel); border:1px solid var(--border);
            border-radius:6px; padding:4px 9px; cursor:pointer; }
    .chip:hover { color:var(--fg); border-color:var(--accent); }
    form { display:flex; padding:12px 18px; gap:10px; border-top:1px solid var(--border); background:var(--panel); }
    #input { flex:1; background:transparent; border:none; color:var(--fg); font:inherit; font-size:14px; outline:none; resize:none; }
    #run { background:var(--accent); color:#0f1117; border:none; border-radius:6px; padding:6px 16px;
           font:inherit; font-weight:600; cursor:pointer; }
    #run:disabled { opacity:.5; cursor:default; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Darklang REPL</h1>
    <span class="status" id="status">loading runtime…</span>
  </header>
  <div id="log"></div>
  <div class="chips" id="chips"></div>
  <form id="form">
    <textarea id="input" rows="1" autocomplete="off" autofocus
              placeholder="1 + 2   (Shift+Enter for a new line)"></textarea>
    <button id="run" type="submit" disabled>run</button>
  </form>

  <!-- Blazor WASM runtime; produced by `dotnet publish` (see README.md). -->
  <script src="_framework/blazor.webassembly.js" autostart="false"></script>
  <script>
    const log = document.getElementById("log");
    const input = document.getElementById("input");
    const runBtn = document.getElementById("run");
    const status = document.getElementById("status");
    let evalInFlight = false;

    const EXAMPLES = [
      "1 + 2",
      '"hello" ++ " world"',
      "[1; 2; 3] |> Stdlib.List.map (fun x -> x * 10)",
      "let x = 21\nx * 2",
      'match 3 with\n| 1 -> "one"\n| _ -> "many"',
    ];
    // #input is a textarea so multi-line examples survive; grow it with content.
    const syncRows = () => {
      input.rows = Math.min(6, input.value.split("\n").length);
    };
    const chips = document.getElementById("chips");
    for (const ex of EXAMPLES) {
      const c = document.createElement("span");
      c.className = "chip"; c.textContent = ex.replace(/\n/g, " ⏎ ");
      c.onclick = () => { input.value = ex; syncRows(); input.focus(); };
      chips.appendChild(c);
    }

    function append(source, out, isErr) {
      const e = document.createElement("div"); e.className = "entry";
      const i = document.createElement("div"); i.className = "in"; i.textContent = source;
      const o = document.createElement("div"); o.className = "out" + (isErr ? " err" : ""); o.textContent = out;
      e.appendChild(i); e.appendChild(o); log.appendChild(e); log.scrollTop = log.scrollHeight;
    }

    // Calls the F# parse → lower → execute seam exported by Repl.Eval.
    async function evalDark(source) {
      return await DotNet.invokeMethodAsync("Darklang.Wasm", "Eval", source);
    }

    const form = document.getElementById("form");
    input.addEventListener("input", syncRows);
    input.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); form.requestSubmit(); }
    });

    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const source = input.value; if (!source.trim()) return;
      if (evalInFlight) return;

      evalInFlight = true;
      runBtn.disabled = true;
      status.textContent = "evaluating…"; status.className = "status busy";
      input.value = ""; syncRows();
      try {
        const evaluated = await evalDark(source);
        append(source, evaluated.result, evaluated.error);
      }
      catch (e) { append(source, String(e.message || e), true); }
      finally {
        evalInFlight = false;
        runBtn.disabled = false;
        status.textContent = "ready"; status.className = "status ready";
        input.focus();
      }
    });

    // The JS-interop dispatcher isn't ready the instant Blazor.start() resolves,
    // so poll a side-effect-free readiness probe before loading packages.
    async function waitForDispatcher() {
      for (let i = 0; i < 120; i++) {
        if (typeof DotNet !== "undefined") {
          try {
            await DotNet.invokeMethodAsync("Darklang.Wasm", "Ready");
            return true;
          } catch (e) { /* dispatcher not ready yet — retry */ }
        }
        await new Promise((r) => setTimeout(r, 500));
      }
      return false;
    }
    async function waitFor(cond, tries) {
      for (let i = 0; i < tries; i++) {
        if (cond()) return true;
        await new Promise((r) => setTimeout(r, 250));
      }
      return false;
    }
    (async () => {
      try {
        // blazor.webassembly.js may load late (or fail) — don't assume the global.
        if (!(await waitFor(() => typeof Blazor !== "undefined" && Blazor.start, 80)))
          throw new Error(
            "_framework/blazor.webassembly.js did not load — check Network tab (404 or wrong content type?)"
          );
        await Blazor.start();
        if (!(await waitForDispatcher())) throw new Error("runtime did not become ready");
      } catch (e) {
        // No runtime — nothing can eval; leave the REPL disabled.
        status.textContent = "runtime not loaded: " + (e && e.message ? e.message : e);
        status.className = "status err";
        console.error("Darklang REPL boot failed:", e);
        return;
      }
      try {
        // Load the package snapshot so Stdlib.* resolves. A failure here (e.g.
        // packages.snapshot missing from the publish) degrades the REPL to
        // builtins-only — it doesn't brick it.
        status.textContent = "loading packages…"; status.className = "status busy";
        const snapshotUrl = new URL("packages.snapshot", document.baseURI).href;
        await DotNet.invokeMethodAsync(
          "Darklang.Wasm", "LoadPackagesFromUrl", snapshotUrl);
        status.textContent = "ready"; status.className = "status ready";
      } catch (e) {
        status.textContent =
          "packages failed to load — builtins only (run generate-snapshot.py, then republish)";
        status.className = "status err";
        console.error("Darklang REPL package load failed:", e);
      }
      runBtn.disabled = false; input.focus();
    })();
  </script>
</body>
</html>
